name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests if available
        working-directory: backend
        run: |
          if [ -f package.json ] && node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No backend tests defined"
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests if available
        working-directory: frontend
        run: |
          if [ -f package.json ] && node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No frontend tests defined"
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build
